version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: revenuepilot
      POSTGRES_PASSWORD: revenuepilot
      POSTGRES_DB: revenuepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revenuepilot -d revenuepilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://revenuepilot:revenuepilot@db:5432/revenuepilot?sslmode=disable
      REVENUEPILOT_DB: postgres
      REVENUEPILOT_ENV: development
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sql/migrations:/app/sql/migrations:ro

volumes:
  postgres_data:
